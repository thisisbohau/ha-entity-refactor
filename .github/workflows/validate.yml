name: Validate

on:
  push:
  pull_request:
  schedule:
    # HACS and hassfest rules change over time; a weekly run catches drift
    # without needing a commit.
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install pytest
      - run: python -m pytest tests/ -q
      - run: node tests/test_batch_ops.mjs
